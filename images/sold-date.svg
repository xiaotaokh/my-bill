<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 日历主体 - 商务黑白灰风格 -->
  <rect x="2" y="4" width="20" height="18" rx="2" fill="#333333"/>
  <!-- 日历内部 -->
  <rect x="3" y="9" width="18" height="12" rx="1" fill="#F5F5F5"/>
  <!-- 日历挂钩 -->
  <rect x="7" y="2" width="2" height="4" rx="1" fill="#333333"/>
  <rect x="15" y="2" width="2" height="4" rx="1" fill="#333333"/>
  <!-- 钱币符号（表示卖出获得金钱） -->
  <circle cx="14" cy="14" r="5" fill="#52C41A"/>
  <circle cx="14" cy="14" r="3.5" fill="#E7F5F1"/>
  <!-- ¥符号 -->
  <rect x="11" y="12" width="6" height="1" rx="0.3" fill="#0A6B52"/>
  <rect x="12" y="14" width="4" height="0.8" rx="0.2" fill="#0A6B52"/>
</svg>