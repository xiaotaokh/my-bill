<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 时钟主体 - 商务黑白灰风格 -->
  <circle cx="12" cy="12" r="9" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- 时钟内部 -->
  <circle cx="12" cy="12" r="7" fill="#E5E5E5"/>
  <!-- 时钟刻度 -->
  <circle cx="12" cy="5" r="1" fill="#333333"/>
  <circle cx="12" cy="19" r="1" fill="#333333"/>
  <circle cx="5" cy="12" r="1" fill="#333333"/>
  <circle cx="19" cy="12" r="1" fill="#333333"/>
  <!-- 时钟指针 -->
  <rect x="11" y="7" width="2" height="5" rx="0.5" fill="#333333"/>
  <rect x="11" y="12" width="2" height="3" rx="0.5" fill="#555555" transform="rotate(90 12 12)"/>
  <!-- 循环累计符号（表示时长累计） -->
  <path d="M18 14 Q20 16 18 18" stroke="#333333" stroke-width="1.5" fill="none"/>
  <polygon points="17,17 19,19 17,19" fill="#333333"/>
</svg>