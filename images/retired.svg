<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 箱子主体（表示存放收纳） -->
  <rect x="3" y="8" width="18" height="14" rx="2" fill="#F59E0B"/>
  <!-- 箱盖 -->
  <rect x="2" y="6" width="20" height="4" rx="1" fill="#D97706"/>
  <!-- 箱盖把手 -->
  <rect x="10" y="7" width="4" height="2" rx="0.5" fill="#FBBF24"/>
  <!-- 箱子内部物品轮廓 -->
  <rect x="5" y="12" width="4" height="6" rx="1" fill="#FDE68A" opacity="0.6"/>
  <rect x="11" y="14" width="3" height="4" rx="0.5" fill="#FDE68A" opacity="0.6"/>
  <rect x="16" y="12" width="3" height="5" rx="0.5" fill="#FDE68A" opacity="0.6"/>
  <!-- 暂停符号（表示停止使用） -->
  <rect x="8" y="10" width="2" height="4" rx="0.5" fill="#fff"/>
  <rect x="12" y="10" width="2" height="4" rx="0.5" fill="#fff"/>
</svg>