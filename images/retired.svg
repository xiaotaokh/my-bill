  <rect x="16" y="12" width="3" height="5" rx="0.5" fill="#FFFBE6" opacity="0.6"/>
  <!-- 暂停符号 -->
  <rect x="8" y="10" width="2" height="4" rx="0.5" fill="#F5F5F5"/>
