<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 日历主体 - 商务黑白灰风格 -->
  <rect x="2" y="4" width="20" height="18" rx="2" fill="#555555"/>
  <!-- 日历内部 -->
  <rect x="3" y="9" width="18" height="12" rx="1" fill="#F5F5F5"/>
  <!-- 日历挂钩 -->
  <rect x="7" y="2" width="2" height="4" rx="1" fill="#555555"/>
  <rect x="15" y="2" width="2" height="4" rx="1" fill="#555555"/>
  <!-- 结束标记（旗帜） -->
  <rect x="11" y="11" width="1" height="8" rx="0.3" fill="#555555"/>
  <polygon points="12,11 18,13 12,15" fill="#CF1322"/>
  <!-- 日期格子（部分填充，表示结束） -->
  <rect x="4" y="11" width="3" height="3" rx="0.5" fill="#555555" opacity="0.6"/>
  <rect x="8" y="11" width="3" height="3" rx="0.5" fill="#555555" opacity="0.4"/>
</svg>