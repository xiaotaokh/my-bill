  <line x1="9" y1="10.5" x2="15" y2="10.5" stroke="#5D7D6E" stroke-width="1.5"/>
  <rect x="10.5" y="7.5" width="1" height="1.5" rx="0.3" fill="#5D7D6E"/>
  <rect x="12.5" y="7.5" width="1" height="1.5" rx="0.3" fill="#5D7D6E"/>

