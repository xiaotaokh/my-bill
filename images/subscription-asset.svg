<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <!-- 日历主体 - 圆润可爱 -->
  <rect x="3" y="5" width="18" height="16" rx="4" fill="url(#calGrad)"/>
  <!-- 日历顶部波浪装饰 -->
  <path d="M3 8 Q6 6 9 8 Q12 10 15 8 Q18 6 21 8" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- 可爱的挂环 - 圆形 -->
  <circle cx="8" cy="4" r="2" fill="#fff"/>
  <circle cx="16" cy="4" r="2" fill="#fff"/>
  <!-- 日历格子 - 圆润可爱 -->
  <rect x="6" y="11" width="4" height="3" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="10" y="11" width="4" height="3" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="14" y="11" width="4" height="3" rx="1" fill="#fff" opacity="0.8"/>
  <!-- 循环小箭头表示订阅 -->
  <path d="M20 17 Q20 15 18 15" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M4 17 Q4 15 6 15" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.7"/>
</svg>