<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景光晕 -->
  <circle cx="16" cy="16" r="14" fill="#D1FAE5" opacity="0.5"/>
  <!-- 外圈循环箭头 -->
  <path d="M22 10A10 10 0 1 1 12 6" fill="none" stroke="#059669" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="4 3"/>
  <!-- 箭头头部 -->
  <path d="M12 4L14 7.5L11 9" fill="none" stroke="#059669" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 内部日历方块 -->
  <rect x="11" y="11.5" width="10" height="11" rx="2" fill="#8B5CF6" opacity="0.1"/>
  <rect x="11" y="11.5" width="10" height="11" rx="2" fill="none" stroke="#8B5CF6" stroke-width="1.4"/>
  <!-- 日历顶部横条 -->
  <line x1="11" y1="14" x2="21" y2="14" stroke="#8B5CF6" stroke-width="1.4" opacity="0.6"/>
  <!-- 日历挂钩 -->
  <line x1="13" y1="10.5" x2="13" y2="12.5" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="10.5" x2="19" y2="12.5" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 日历内日期占位 -->
  <line x1="13.5" y1="17.5" x2="18.5" y2="17.5" stroke="#C4B5FD" stroke-width="1" stroke-linecap="round"/>
  <line x1="13.5" y1="20" x2="16.5" y2="20" stroke="#C4B5FD" stroke-width="1" stroke-linecap="round"/>
  <!-- 循环小点装饰 -->
  <circle cx="23" cy="20" r="1" fill="#059669" opacity="0.5"/>
  <circle cx="24.5" cy="17" r="0.8" fill="#059669" opacity="0.3"/>
</svg>
