<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 物品盒子（左侧，表示卖出的资产） -->
  <rect x="1" y="5" width="9" height="14" rx="2" fill="#3B82F6"/>
  <!-- 盒子上的¥标记 -->
  <rect x="3" y="8" width="5" height="1.2" rx="0.4" fill="#fff"/>
  <rect x="4" y="10" width="3" height="1" rx="0.3" fill="#fff"/>
  <!-- 大箭头（表示卖出交易方向） -->
  <polygon points="11,7 16,12 11,17 14,17 18,12 14,7" fill="#10B98E"/>
  <!-- 大钱币（右侧，表示换得的钱） -->
  <circle cx="20" cy="12" r="6" fill="#FBBF24"/>
  <!-- 钱币内圈 -->
  <circle cx="20" cy="12" r="4" fill="#F59E0B"/>
  <!-- ¥符号 -->
  <rect x="17" y="10" width="6" height="1.5" rx="0.5" fill="#fff"/>
  <rect x="18" y="13" width="4" height="1" rx="0.3" fill="#fff"/>
</svg>