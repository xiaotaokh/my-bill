<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 物品盒子 - 商务黑白灰风格 -->
  <rect x="1" y="5" width="9" height="14" rx="2" fill="#333333"/>
  <!-- 盒子上的¥标记 -->
  <rect x="3" y="8" width="5" height="1.2" rx="0.4" fill="#F5F5F5"/>
  <rect x="4" y="10" width="3" height="1" rx="0.3" fill="#F5F5F5"/>
  <!-- 大箭头 -->
  <polygon points="11,7 16,12 11,17 14,17 18,12 14,7" fill="#52C41A"/>
  <!-- 大钱币 -->
  <circle cx="20" cy="12" r="6" fill="#D48806"/>
  <!-- 钱币内圈 -->
  <circle cx="20" cy="12" r="4" fill="#FFFBE6"/>
  <!-- ¥符号 -->
  <rect x="17" y="10" width="6" height="1.5" rx="0.5" fill="#D48806"/>
  <rect x="18" y="13" width="4" height="1" rx="0.3" fill="#D48806"/>
</svg>