<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 日历主体 - 商务黑白灰风格 -->
  <rect x="2" y="4" width="20" height="18" rx="2" fill="#333333"/>
  <!-- 日历内部 -->
  <rect x="3" y="9" width="18" height="12" rx="1" fill="#F5F5F5"/>
  <!-- 日历挂钩 -->
  <rect x="7" y="2" width="2" height="4" rx="1" fill="#333333"/>
  <rect x="15" y="2" width="2" height="4" rx="1" fill="#333333"/>
  <!-- 开始箭头（指向右边，表示开始） -->
  <polygon points="6,14 10,14 10,11 13,15 10,19 10,16 6,16" fill="#52C41A"/>
  <!-- 日期格子 -->
  <rect x="14" y="11" width="3" height="3" rx="0.5" fill="#333333" opacity="0.6"/>
  <rect x="17" y="11" width="3" height="3" rx="0.5" fill="#333333" opacity="0.4"/>
</svg>