<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 盒子主体 - 商务黑白灰风格 -->
  <rect x="4" y="6" width="16" height="14" rx="2" fill="#333333"/>
  <!-- 盒子顶部盖子 -->
  <rect x="3" y="4" width="18" height="3" rx="1" fill="#555555"/>
  <!-- 盒子内部 -->
  <rect x="5" y="8" width="14" height="10" rx="1" fill="#F5F5F5"/>
  <!-- 盒子物品轮廓 -->
  <rect x="7" y="10" width="4" height="6" rx="1" fill="#E5E5E5"/>
  <rect x="13" y="10" width="4" height="6" rx="1" fill="#E5E5E5"/>
  <!-- 单次付款标记 -->
  <circle cx="18" cy="5" r="4" fill="#52C41A"/>
  <rect x="15" y="4" width="6" height="1.5" rx="0.5" fill="#FFFFFF"/>
  <rect x="16" y="6.5" width="4" height="1" rx="0.3" fill="#FFFFFF"/>
