<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 时钟主体 - 商务黑白灰风格 -->
  <circle cx="12" cy="12" r="10" fill="#333333"/>
  <!-- 时钟内部 -->
  <circle cx="12" cy="12" r="8" fill="#F5F5F5"/>
  <!-- 时钟刻度 -->
  <circle cx="12" cy="5" r="1" fill="#333333"/>
  <circle cx="12" cy="19" r="1" fill="#333333"/>
  <circle cx="5" cy="12" r="1" fill="#333333"/>
  <circle cx="19" cy="12" r="1" fill="#333333"/>
  <!-- 时钟指针 -->
  <rect x="11" y="7" width="2" height="5" rx="0.5" fill="#333333"/>
  <rect x="11" y="12" width="2" height="4" rx="0.5" fill="#555555" transform="rotate(90 12 12)"/>
  <!-- 添加标记（+号） -->
  <circle cx="18" cy="6" r="4" fill="#333333"/>
  <rect x="16" y="5.5" width="4" height="1" rx="0.3" fill="#F5F5F5"/>
  <rect x="17.5" y="4" width="1" height="4" rx="0.3" fill="#F5F5F5"/>
</svg>