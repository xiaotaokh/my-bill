<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 日历主体 - 商务黑白灰风格（使用警告色表示退役） -->
  <rect x="2" y="4" width="20" height="18" rx="2" fill="#D48806"/>
  <!-- 日历内部 -->
  <rect x="3" y="9" width="18" height="12" rx="1" fill="#FFF6E9"/>
  <!-- 日历挂钩 -->
  <rect x="7" y="2" width="2" height="4" rx="1" fill="#D48806"/>
  <rect x="15" y="2" width="2" height="4" rx="1" fill="#D48806"/>
  <!-- 旗帜（表示退役结束） -->
  <rect x="10" y="11" width="1.5" height="7" rx="0.3" fill="#D48806"/>
  <polygon points="11.5,11 18,13.5 11.5,16" fill="#9B5C1A"/>
</svg>