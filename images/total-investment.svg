<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 钱袋子 - 商务黑白灰风格 -->
  <ellipse cx="12" cy="16" rx="8" ry="6" fill="#333333"/>
  <!-- 钱袋口 -->
  <ellipse cx="12" cy="10" rx="6" ry="2" fill="#555555"/>
  <!-- 钱袋绳子 -->
  <path d="M6 10 Q12 6 18 10" stroke="#333333" stroke-width="2" fill="none"/>
  <!-- ¥符号 -->
  <rect x="8" y="13" width="8" height="1.5" rx="0.5" fill="#F5F5F5"/>
  <rect x="9" y="15.5" width="6" height="1" rx="0.3" fill="#F5F5F5"/>
  <!-- 增加标记（+号） -->
  <circle cx="19" cy="5" r="4" fill="#52C41A"/>
  <rect x="17" y="4.5" width="4" height="1" rx="0.3" fill="#F5F5F5"/>
  <rect x="18.5" y="3" width="1" height="4" rx="0.3" fill="#F5F5F5"/>
</svg>